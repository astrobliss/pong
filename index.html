<canvas id="gc" width="640" height="480"></canvas>
<script>
p1y=p2y=240;
pt=10;
ph=100;
bx=320;
by=240;
bd=6;
	
	my=240;
updates=0;
stuck=false;
updateCount=0;
foundSpeed=0;
	cheatx=320;
	cheaty=240;
	cheatspeed=3;
speed=5/4;
vy=vx=speed;
	cheatvy=cheatvx=cheatspeed*speed;
score1=score2=0;
ais=1/4;
aisError=5;
slowAis=1;
	ratio=(Math.sqrt(cheatvy*cheatvy+cheatvx*cheatvx)-Math.sqrt(vy*vy-vx*vx));
window.onload=function(){
c=document.getElementById('gc');
cc=c.getContext('2d');
setInterval(update,1000/240);
c.addEventListener('mousemove',function(e){
	p1y=e.clientY-ph/2;
	});
}
function reset(){
	ais+=score1-score2;
	if(ais<3){ais=4;}
	bx=c.width/2;
	by=c.height/2;
	vx=-vx;
	if(vx<0) vx=vy=-1*speed;
	else vx=vy=speed;
	cheatx=bx;
	cheaty=by;
	cheatvx=vx*cheatspeed;
	cheatvy=vy*cheatspeed;
	var audio = new Audio("FX Riser 001 Lex Luger Effect.wav");
			audio.play();
	ratio=(Math.sqrt(cheatvy*cheatvy+cheatvx*cheatvx)-Math.sqrt(vy*vy-vx*vx));
}
function update(){
	bx+=vx;
	by+=vy;
	cheaty+=cheatvy;
	cheatx+=cheatvx;
	if(!stuck)updates++;
	if(cheaty<0&&cheatvy<0){
		cheatvy=-cheatvy;
	}
	if(cheaty>c.height&&cheatvy>0){
		cheatvy=-cheatvy;
	}
	
	if(cheatx>=c.width&&cheatvx!=0)
	{
		
		cheatvy=0;
		cheatvx=0;
		stuck=true;
	}
	if(by<0&&vy<0){
		vy=-vy;
	}
	if(by>c.height&&vy>0){
		vy=-vy;
	}
	if(bx>c.width){
		if(by>p2y&&by<p2y+ph){
			
			var audio = new Audio("Gun Shot.wav");
			audio.play();
		vx=-vx;
		dy=by-(p2y+ph/2);
		vy=dy*.3/4;
		cheatx=c.width/2;
		cheaty=c.height/2;
		cheatvx=0;
		cheatvy=0;
		updates=0;
		updateCount=0;
		foundSpeed=0;
		stuck=false;
	}else{
		cheatvx=0;
		cheatvy=0;
		updates=0;
		updateCount=0;
		foundSpeed=0;
		stuck=false;
		score1++;
		reset();
		}
	}
	if(bx<0){
		if(by>p1y&&by<p1y+ph){
			var audio = new Audio("Gun Shot.wav");
			audio.play();
		vx=-vx;
		dy=by-(p1y+ph/2);
		vy=dy*.3/4;
		cheatx=bx;
		cheaty=by;
		cheatvx=vx*cheatspeed;
		cheatvy=vy*cheatspeed;
	}else{
		score2++;
		reset();
		}
	}
	if(!stuck)
	{
		if(p2y+ph/2<=my+ais&&p2y+ph/2>=my-ais)
			p2y=my-50;
		if(p2y+ph/2>my)
			p2y-=ais;
		if(p2y+ph/2<my)
			p2y+=ais;
	}else{
		if(foundSpeed==0)
		{
			foundSpeed=(cheaty-(p2y+50))/(updates)*ratio;
			console.log('foundSpeed: '+foundSpeed+ ' ' + ratio);
		}
		p2y+=foundSpeed;
	}
	cc.fillStyle='black';
	cc.fillRect(0,0,c.width,c.height);
	cc.fillStyle='white';
	cc.fillRect(0,p1y,pt,ph);
	cc.fillRect(c.width-pt,p2y,pt,ph);
	cc.fillRect(bx-bd/2,by-bd/2,bd,bd);
	cc.fillStyle='red';
	cc.fillRect(cheatx-bd/2,cheaty-bd/2,bd,bd);
	cc.fillStyle='white';
	cc.fillText(score1,100,100);
	cc.fillText(score2,c.width-100,100);
}
</script>
