<canvas id="gc" width="640" height="480"></canvas>
<script>
p1y=p2y=40;
pt=10;
ph=100;
bx=by=100;
bd=6;
	cheatx=cheaty=100;
	cheatspeed=1;
speed=5;
yv=xv=speed;
	cheatvy=cheatvx=cheatspeed*speed;
score1=score2=0;
ais=6;
aisError=5;
slowAis=1;
window.onload=function(){

c=document.getElementById('gc');
cc=c.getContext('2d');
setInterval(update,1000/60);
c.addEventListener('mousemove',function(e){
	p1y=e.clientY-ph/2;
	});
}
function reset(){
	ais+=score1-score2;
	if(ais<3){ais=4;}

	bx=c.width/2;
	by=c.height/2;
	xv=-xv;
	if(xv<0) xv=yv=-1*speed;
	else xv=yv=speed;
	cheatx=bx;
	cheaty=vy;
	cheatvx=xv*cheatspeed;
	cheatvy=yv*cheatspeed;
	var audio = new Audio("FX Riser 001 Lex Luger Effect.wav");
			audio.play();
}
function update(){
	bx+=xv;
	by+=yv;
	cheaty+=cheatvy;
	cheatx+=cheatvx;

	if(cheaty<0&&cheatvy<0){
		cheatvy=-cheatvy;
	}
	if(cheaty>c.height&&cheatvy<c.height){
		cheatvy=-cheatvy;
	}
	if(cheatx<=0)
	{	
		cheatvy=0; 
		cheatvx=0;
	}
	if(cheaty>=c.width)
	{
		cheatvy=0;
		cheatvx=0;
	}


	if(by<0&&yv<0){
		yv=-yv;
	}
	if(by>c.height&&yv<c.height){
		yv=-yv;
	}

	if(bx>c.width){
		if(by>p2y&&by<p2y+ph){
			
			var audio = new Audio("Gun Shot.wav");
			audio.play();

		xv=-xv;
		dy=by-(p2y+ph/2);
		yv=dy*.3;

		cheatx=bx;
		cheaty=vy;
		cheatvx=xv*cheatspeed;
		cheatvy=yv*cheatspeed;
	}else{
		score1++;
		reset();
		}
	}

	if(bx<0){
		if(by>p1y&&by<p1y+ph){
			var audio = new Audio("Gun Shot.wav");
			audio.play();
		xv=-xv;
		dy=by-(p1y+ph/2);
		yv=dy*.3;
		cheatx=bx;
		cheaty=vy;
		cheatvx=xv*cheatspeed;
		cheatvy=yv*cheatspeed;
	}else{
		score2++;
		reset();
		}
	}
	if(p2y+ph/2>=cheaty+aisError||p2y+ph/2<=cheaty-aisError)
	{
	if(p2y+ph/2<cheaty){
		p2y+=ais;
	} else {
		p2y-=ais;
	}}
	else{
	if(p2y+ph/2<cheaty)
		p2y+=slowAis;
	 else p2y-= slowAis;
	
	}

	cc.fillStyle='black';
	cc.fillRect(0,0,c.width,c.height);
	cc.fillStyle='white';
	cc.fillRect(0,p1y,pt,ph);
	cc.fillRect(c.width-pt,p2y,pt,ph);
	cc.fillRect(bx-bd/2,by-bd/2,bd,bd);
	cc.fillText(score1,100,100);
	cc.fillText(score2,c.width-100,100);

}
</script>
