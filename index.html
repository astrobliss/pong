<canvas id="gc" width="640" height="480"></canvas>
<script>
p1y=p2y=240;
pt=10;
ph=100;
bx=by=240;
bd=6;
	cheatx=cheaty=100;
	cheatspeed=10;
speed=5;
yv=xv=speed;
	cheatvy=cheatvx=cheatspeed*speed;
score1=score2=0;
ais=1;
aisError=5;
slowAis=1;
window.onload=function(){
c=document.getElementById('gc');
cc=c.getContext('2d');
setInterval(update,1000/60);
c.addEventListener('mousemove',function(e){
	p1y=e.clientY-ph/2;
	});
}
function reset(){
	ais+=score1-score2;
	if(ais<3){ais=4;}
	bx=c.width/2;
	by=c.height/2;
	xv=-xv;
	if(xv<0) xv=yv=-1*speed;
	else xv=yv=speed;
	cheatx=bx;
	cheaty=yv;
	cheatvx=xv*cheatspeed;
	cheatvy=yv*cheatspeed;
	var audio = new Audio("FX Riser 001 Lex Luger Effect.wav");
			audio.play();
}
function update(){
	bx+=xv;
	by+=yv;
	cheaty+=cheatvy;
	cheatx+=cheatvx;
	if(cheaty<0&&cheatvy<0){
		cheatvy=-cheatvy;
	}
	if(cheaty>c.height&&cheatvy<c.height){
		cheatvy=-cheatvy;
	}
	
	if(cheatx>=c.width&&cheatvx!=0)
	{
		cheatvy=0;
		cheatvx=0;
		console.log('cheat '+cheaty+ ' ' + cheatx);
	}
	if(by<0&&yv<0){
		yv=-yv;
	}
	if(by>c.height&&yv<c.height){
		yv=-yv;
	}
	if(bx>c.width){
		console.log('ball ' + bx + ' ' + by);
		if(by>p2y&&by<p2y+ph){
			
			var audio = new Audio("Gun Shot.wav");
			audio.play();
		xv=-xv;
		dy=by-(p2y+ph/2);
		yv=dy*.3;
		cheatx=c.width/2;
		cheaty=c.height/2;
		cheatvx=0;
		cheatvy=0;
	}else{
		score1++;
		reset();
		}
	}
	if(bx<0){
		if(by>p1y&&by<p1y+ph){
			var audio = new Audio("Gun Shot.wav");
			audio.play();
		xv=-xv;
		dy=by-(p1y+ph/2);
		yv=dy*.3;
		cheatx=bx;
		cheaty=yv;
		cheatvx=xv*cheatspeed;
		cheatvy=yv*cheatspeed;
	}else{
		score2++;
		reset();
		}
	}
	if(p2y+ph/2<=cheaty+ais&&p2y+ph/2>=cheaty-ais)
		p2y=cheaty-50;
	if(p2y+ph/2>cheaty)
		p2y-=ais;
	if(p2y+ph/2<cheaty)
		p2y+=ais;
	cc.fillStyle='black';
	cc.fillRect(0,0,c.width,c.height);
	cc.fillStyle='white';
	cc.fillRect(0,p1y,pt,ph);
	cc.fillRect(c.width-pt,p2y,pt,ph);
	cc.fillRect(bx-bd/2,by-bd/2,bd,bd);
	cc.fillText(score1,100,100);
	cc.fillText(score2,c.width-100,100);
}
</script>
